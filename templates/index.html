<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rover UI</title>

<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

<!-- THREE JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
</head>

<body>

<div class="container">

  <!-- CAMERA PANEL -->
  <div class="camera-panel">
    <div class="camera-header">
      <h2>LIVE CAMERA</h2>
      <div class="people-count">👥 People: <span id="people">0</span></div>
    </div>
    <img src="/video_feed" class="camera-feed">
  </div>

  <!-- SENSOR GRID -->
  <div class="sensor-grid">
    <div class="card">
      <div class="card-header">LEFT DISTANCE</div>
      <div class="value" id="left">--</div>
    </div>
    <div class="card">
      <div class="card-header">RIGHT DISTANCE</div>
      <div class="value" id="right">--</div>
    </div>
    <div class="card">
      <div class="card-header">TEMPERATURE</div>
      <div class="value" id="temp">--</div>
    </div>
    <div class="card">
      <div class="card-header">HUMIDITY</div>
      <div class="value" id="hum">--</div>
    </div>
    <div class="card">
      <div class="card-header">GAS LEVEL</div>
      <div class="value" id="gas">--</div>
    </div>
    <div class="card">
      <div class="card-header">WATER TANK</div>
      <div class="value" id="water">--</div>
    </div>
    <div class="card">
      <div class="card-header">BATTERY</div>
      <div class="value" id="battery">--</div>
    </div>

    <!-- 🔥 3D MODEL CARD -->
    <div class="card" style="grid-column: span 2;">
      <div class="card-header">ROVER ORIENTATION</div>
      <div id="3dModel" style="width:100%; height:200px;"></div>
    </div>

    <!-- PUMP STATUS -->
    <div class="card">
      <div class="card-header">PUMP MODE</div>
      <div class="value" id="pump_mode">--</div>
    </div>
    <div class="card">
      <div class="card-header">PUMP STATE</div>
      <div class="value" id="pump_state">--</div>
    </div>

  </div>

  <!-- MOTOR -->
  <div class="panel">
    <h3>MOTOR CONTROL</h3>
    <div class="controls">
      <button onclick="move('forward')">⬆</button>
      <button onclick="move('left')">⬅</button>
      <button onclick="move('stop')">■</button>
      <button onclick="move('right')">➡</button>
      <button onclick="move('backward')">⬇</button>
    </div>
  </div>

  <!-- PUMP -->
  <div class="panel">
    <h3>WATER PUMP</h3>
    <button onclick="pump('on')">ON</button>
    <button onclick="pump('off')">OFF</button>
    <button onclick="pump('auto')">AUTO</button>
  </div>

  <!-- AUDIO -->
  <div class="panel">
    <h3>AUDIO & DISPLAY</h3>

    <button onclick="playSound('alert')">ALERT</button>
    <button onclick="playSound('siren')">SIREN</button>
    <button onclick="playSound('horn')">HORN</button>

    <br><br>

    <input type="text" id="textMsg" placeholder="Send text...">
    <button onclick="sendText()">SEND</button>
  </div>

</div>

<script>

// ------------------- THREE JS -------------------
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, 2, 0.1, 1000);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(300, 200);
document.getElementById("3dModel").appendChild(renderer.domElement);

// cube = rover
let geometry = new THREE.BoxGeometry();
let material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
let cube = new THREE.Mesh(geometry, material);

scene.add(cube);
camera.position.z = 3;

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

// ------------------- CONTROL -------------------
function move(dir) {
  fetch(`/move?dir=${dir}`);
}

function pump(state) {
  fetch(`/pump?state=${state}`);
}

function playSound(type) {
  fetch(`/audio?type=${type}`);
}

function sendText() {
  let msg = document.getElementById("textMsg").value;
  fetch(`/send_text?msg=${encodeURIComponent(msg)}`);
}

// ------------------- LIVE DATA -------------------
setInterval(async () => {
  try {
    let res = await fetch(`/sensors`);
    let data = await res.json();

    document.getElementById("left").innerText = data.left + " cm";
    document.getElementById("right").innerText = data.right + " cm";
    document.getElementById("temp").innerText = data.temp;
    document.getElementById("hum").innerText = data.hum;
    document.getElementById("gas").innerText = data.gas;
    document.getElementById("water").innerText = data.water;
    document.getElementById("battery").innerText = data.battery;
    document.getElementById("people").innerText = data.people;

    document.getElementById("pump_mode").innerText = data.pump_mode;
    document.getElementById("pump_state").innerText = data.pump_state;

    // 🔥 ROTATE 3D MODEL
    cube.rotation.x = data.pitch * Math.PI / 180;
    cube.rotation.y = data.yaw * Math.PI / 180;
    cube.rotation.z = data.roll * Math.PI / 180;

  } catch (e) {
    console.log("Disconnected");
  }
}, 100);

</script>

</body>
</html>
